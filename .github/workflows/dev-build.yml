name: Dev Builds

on:
  workflow_dispatch:   # Manual trigger for side builds

env:
  APP_NAME: "Universal Downloader"
  VERSION: "v0.2.2"
  PYTHON_VERSION: "3.14.3"

jobs:
  build-windows:
    name: Build Windows (Dev)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6 # Latest 2026 stable

      - name: Setup Python
        uses: actions/setup-python@v6 # Latest 2026 stable
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Generate Build Metadata
        shell: bash
        run: |
          mkdir -p assets
          echo "${{ env.VERSION }}-dev" > assets/version.txt
          echo "${GITHUB_SHA:0:7}" > assets/commit.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade pyinstaller "yt-dlp[default]"
          if (Test-Path requirements.txt) { pip install -r requirements.txt }

      - name: Install & Verify Binaries (Choco)
        shell: pwsh
        run: |
          # 1. Install the tools
          choco install deno ffmpeg -y
          
          # 2. Ensure the bin folder exists
          if (!(Test-Path bin)) { New-Item -ItemType Directory -Path bin }
          
          # 3. Search the Chocolatey 'lib' folder for the real .exe files
          # This finds the actual binaries even if the PATH hasn't updated
          $denoPath = (Get-ChildItem -Path "C:\ProgramData\chocolatey\lib" -Filter "deno.exe" -Recurse | Select-Object -First 1).FullName
          $ffmpegPath = (Get-ChildItem -Path "C:\ProgramData\chocolatey\lib" -Filter "ffmpeg.exe" -Recurse | Select-Object -First 1).FullName
          
          # 4. Copy them to your local bin folder
          Copy-Item $denoPath "bin\deno.exe"
          Copy-Item $ffmpegPath "bin\ffmpeg.exe"

          # 5. Verify the files are there
          Get-ChildItem bin\

      - name: Build Executable
        shell: pwsh
        run: |
          python -m PyInstaller --clean --noconsole --onefile `
            --collect-all customtkinter --collect-all yt_dlp `
            --add-data "assets;assets" `
            --add-binary "bin/ffmpeg.exe;bin" `
            --add-binary "bin/deno.exe;bin" `
            --icon "assets/icon.ico" `
            --name "${{ env.APP_NAME }}" `
            main.py

      - name: Rename and Prepare Artifact
        shell: pwsh
        run: |
          $VER = Get-Content assets/version.txt
          $SHA = Get-Content assets/commit.txt
          $CleanAppName = "${{ env.APP_NAME }}".Replace(" ", "_")
          $NewName = "${CleanAppName}_${VER}_$SHA"
          # Rename the file so the download is clearly labeled
          Move-Item "dist/${{ env.APP_NAME }}.exe" "dist/$NewName.exe"
          echo "FINAL_NAME=$NewName" >> $env:GITHUB_ENV

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v7 # Use v7 for 2026 Node 24 runners
        with:
          name: windows-dev-build
          path: dist/${{ env.FINAL_NAME }}.exe

  build-macos:
    name: Build macOS (Dev)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install --upgrade pyinstaller "yt-dlp[default]"
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Install & Verify Binaries (Brew)
        run: |
          brew install deno ffmpeg
          mkdir -p bin
          cp $(which ffmpeg) bin/ffmpeg
          cp $(which deno) bin/deno
          chmod +x bin/*

      - name: Build macOS app
        run: |
          python -m PyInstaller --clean --windowed \
            --collect-all customtkinter --collect-all yt_dlp \
            --add-data "assets:assets" \
            --add-binary "bin/ffmpeg:bin" \
            --add-binary "bin/deno:bin" \
            --icon "assets/icon.icns" \
            --name "${{ env.APP_NAME }}" \
            main.py

      - name: Create DMG
        run: |
          mkdir -p dist/dmg_staging
          cp -R "dist/${{ env.APP_NAME }}.app" dist/dmg_staging/
          ln -s /Applications dist/dmg_staging/Applications
          hdiutil create -volname "${{ env.APP_NAME }} Beta" -srcfolder dist/dmg_staging -ov -format UDZO "app_beta.dmg"

      - name: Rename DMG for Artifact
        run: |
          VER=$(cat assets/version.txt)
          SHA=$(cat assets/commit.txt)
          CLEAN_APP=$(echo "${{ env.APP_NAME }}" | tr ' ' '_')
          CLEAN_NAME="${CLEAN_APP}_${VER}_$SHA"
          mv "app_beta.dmg" "${CLEAN_NAME}.dmg"
          echo "FINAL_NAME_MAC=${CLEAN_NAME}" >> $GITHUB_ENV

      - name: Upload macOS Artifact
        uses: actions/upload-artifact@v7
        with:
          name: macos-dev-build
          path: ${{ env.FINAL_NAME_MAC }}.dmg