name: Dev Builds

on:
  workflow_dispatch:   # Manual trigger
  pull_request:
    branches:
      - main          # Dependabot PRs
    paths:
      - '**/requirements.txt'
  push:
    branches:
      - main          # After merging PRs
    paths:
      - '**/requirements.txt'

env:
  APP_NAME: "Universal Downloader"
  VERSION: beta
  
jobs:
  build-windows:
    name: Build Windows (Dev)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14.3"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Install Deno via Chocolatey
        shell: pwsh
        run: |
          choco install deno -y
          refreshenv 
          $denoPath = "C:\ProgramData\chocolatey\bin\deno.exe"
          Copy-Item $denoPath (Join-Path $PWD "deno.exe")

      - name: Install FFmpeg via Chocolatey
        shell: pwsh
        run: |
          choco install ffmpeg -y
          refreshenv
          $ffmpegPath = "C:\ProgramData\chocolatey\bin\ffmpeg.exe"
          Copy-Item $ffmpegPath (Join-Path $PWD "ffmpeg.exe")

      - name: Generate UI Commit txt File
        shell: bash
        run: |
          mkdir -p assets
          echo "${{ github.sha }}" | cut -c1-7 > assets/commit.txt

      - name: Build Executable
        shell: pwsh
        run: |
          python -m PyInstaller --clean --noconsole --onefile `
            --collect-all customtkinter `
            --collect-all yt_dlp `
            --add-data "assets;assets" `
            --add-binary "ffmpeg.exe;." `
            --add-binary "deno.exe;." `
            --icon "assets/icon.ico" `
            --name "${{ env.APP_NAME }}" `
            main.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: windows-dev-build
          path: dist/${{ env.APP_NAME }}_win64_${{ env.VERSION }}.exe


  build-macos:
    name: Build macOS (Dev)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14.3"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Install Deno
        run: brew install deno

      - name: Install FFmpeg
        run: brew install ffmpeg

      - name: Copy FFmpeg binary
        run: |
          FF=$(which ffmpeg)
          cp "$FF" ./ffmpeg
          chmod +x ffmpeg

      - name: Copy Deno binary
        run: |
          DENO=$(which deno)
          cp "$DENO" ./deno
          chmod +x deno

      - name: Generate UI Commit File
        run: |
          mkdir -p assets
          echo "${GITHUB_SHA:0:7}" > assets/commit.txt

      - name: Build macOS app
        run: |
          python -m PyInstaller --clean --windowed \
            --collect-all customtkinter \
            --collect-all yt_dlp \
            --add-data "assets:assets" \
            --add-binary "ffmpeg:." \
            --add-binary "deno:." \
            --icon "assets/icon.icns" \
            --name "${APP_NAME}" \
            main.py

      - name: Create DMG with Applications Shortcut
        run: |
          mkdir -p dist/dmg_staging
          cp -R dist/*.app dist/dmg_staging/
          ln -s /Applications dist/dmg_staging/Applications
          hdiutil create -volname "${APP_NAME} Beta" \
            -srcfolder dist/dmg_staging \
            -ov -format UDZO \
            "${APP_NAME}_macOS_beta.dmg"

      - name: Rename DMG to Beta Version
        id: rename_dmg
        run: |
          SHORT_SHA=${GITHUB_SHA:0:7}
          mv "${APP_NAME}_macOS_beta.dmg" "${APP_NAME}_beta_$SHORT_SHA.dmg"
          echo "artifact=${APP_NAME}_beta_$SHORT_SHA.dmg" >> $GITHUB_OUTPUT

      - name: Upload macOS Artifact
        uses: actions/upload-artifact@v7
        with:
          name: macos-dev-build
          path: ${{ steps.rename_dmg.outputs.artifact }}