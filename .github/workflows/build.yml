name: Build & Release  # The overall workflow name

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*'

jobs:
  build-windows: # This specific job handles Windows
    name: Windows Build
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Install FFmpeg
      run: |
        choco install ffmpeg -y

    - name: Copy FFmpeg
      run: |
        copy "C:\ProgramData\chocolatey\lib\ffmpeg\tools\ffmpeg\bin\ffmpeg.exe" ffmpeg.exe

    - name: Copy Engines
      run: |
        copy "C:\ProgramData\chocolatey\lib\ffmpeg\tools\ffmpeg\bin\ffmpeg.exe" ffmpeg.exe
        copy "C:\ProgramData\chocolatey\lib\ffmpeg\tools\ffmpeg\bin\ffprobe.exe" ffprobe.exe

    - name: Compile Executable
      run: |
        python -m PyInstaller --clean --noconsole --onefile `
        --collect-all customtkinter `
        --collect-all yt_dlp `
        --icon "assets/icon.ico" `
        --add-data "assets;assets" `
        --add-binary "ffmpeg.exe;." `
        --add-binary "ffprobe.exe;." `
        --name "UniversalDownloader_win64_${{ github.ref_name }}" `
        "main.py"

    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: dist/UniversalDownloader_win64_${{ github.ref_name }}.exe
        name: "Universal Media Downloader ${{ github.ref_name }}"
        prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') }}
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}