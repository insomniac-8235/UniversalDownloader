name: Build & Release (Multi-OS)

on:
  push:
    branches: ["main"]
    tags:
      - "v*"  # Matches v0.1.0, v0.1.0-beta, etc.

env:
  APP_NAME: UniversalDownloader
  VERSION: ${{ github.ref_name }}  # Git tag version

jobs:

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    env:
      VERSION: ${{ github.ref_name }}
    outputs:
      artifact_path: ${{ steps.rename.outputs.artifact }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Install FFmpeg
        run: choco install ffmpeg -y

      - name: Copy FFmpeg binaries
        shell: pwsh
        run: |
          copy "C:\ProgramData\chocolatey\lib\ffmpeg\tools\ffmpeg\bin\ffmpeg.exe" ffmpeg.exe
          copy "C:\ProgramData\chocolatey\lib\ffmpeg\tools\ffmpeg\bin\ffprobe.exe" ffprobe.exe

      - name: Build executable with version info
        shell: pwsh
        run: |
          python -m PyInstaller --clean --noconsole --onefile `
            --collect-all customtkinter `
            --collect-all yt_dlp `
            --add-data "assets;assets" `
            --add-binary "ffmpeg.exe;." `
            --icon "assets/icon.ico" `
            --name "UniversalDownloader_win64" `
            main.py

      - name: Rename Windows artifact with version
        id: rename
        shell: pwsh
        run: |
          $newName = "${{ env.APP_NAME }}_win64_${{ env.VERSION }}.exe"
          mv "dist/UniversalDownloader_win64.exe" "dist/$newName"
          echo "artifact=dist/$newName" >> $env:GITHUB_OUTPUT


  build-macos:
    name: Build macOS
    runs-on: macos-latest
    outputs:
      artifact_path: ${{ steps.rename.outputs.artifact }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Download FFmpeg
        run: |
          curl -L -o ffmpeg.zip https://evermeet.cx/ffmpeg/getrelease/zip
          unzip -o ffmpeg.zip
          chmod +x ffmpeg
          rm ffmpeg.zip

      - name: Build macOS app
        run: |
          python -m PyInstaller --clean --windowed \
          --collect-all customtkinter \
          --collect-all yt_dlp \
          --add-data "assets:assets" \
          --add-binary "ffmpeg:." \
          --icon "assets/icon.icns" \
          --name "UniversalDownloader_macOS" \
          main.py

      - name: Create DMG
        id: rename
        run: |
          hdiutil create -volname "${{ env.APP_NAME }}" -srcfolder dist/UniversalDownloader_macOS.app -ov -format UDZO "${{ env.APP_NAME }}_macOS_${{ env.VERSION }}.dmg"
          echo "artifact=${{ env.APP_NAME }}_macOS_${{ env.VERSION }}.dmg" >> $GITHUB_OUTPUT

  release:
    name: Create Release
    needs: [ build-windows, build-macos ]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create Versions File with commit hash
        run: |
          TAG=${{ env.VERSION }}
          COMMIT=$(git rev-parse --short HEAD)
          echo "Version: $TAG" > versions_${{ env.VERSION }}.txt
          echo "Commit: $COMMIT" >> versions_${{ env.VERSION }}.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Universal Media Downloader ${{ github.ref_name }}
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            ${{ needs.build-windows.outputs.artifact_path }}
            ${{ needs.build-macos.outputs.artifact_path }}
            versions_${{ env.VERSION }}.txt
