name: Build & Release (Official)

on:
  push:
    tags:
      - "v*"

env:
  APP_NAME: "Universal Downloader"
  BINARY_NAME: "universal-downloader"  # Lowercase & terminal-friendly
  PYTHON_VERSION: "3.14.3"

jobs:
  build-windows:
    name: Build Windows (x64)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Clean Version
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          echo "CLEAN_VERSION=$version" >> $env:GITHUB_ENV

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller "yt-dlp[default]"
          if (Test-Path requirements.txt) { pip install -r requirements.txt }

      - name: Bundle Binaries (Deno & FFmpeg)
        shell: pwsh
        run: |
          choco install ffmpeg deno -y
          mkdir bin
          Copy-Item "C:\ProgramData\chocolatey\bin\ffmpeg.exe" "bin\ffmpeg.exe"
          Copy-Item "C:\ProgramData\chocolatey\bin\deno.exe" "bin\deno.exe"

      - name: Build Executable
        shell: pwsh
        run: |
          python -m PyInstaller --clean --noconsole --onefile `
            --collect-all customtkinter --collect-all yt_dlp `
            --add-data "assets;assets" `
            --add-binary "bin/ffmpeg.exe;bin" `
            --add-binary "bin/deno.exe;bin" `
            --icon "assets/icon.ico" 
            --name "${{ env.APP_NAME }}" 
            main.py

      - name: Prepare Artifact
        shell: pwsh
        run: |
          $FinalName = "${{ env.BINARY_NAME }}_${{ env.CLEAN_VERSION }}_win-x64.exe"
          mv "dist/${{ env.BINARY_NAME }}.exe" "$FinalName"
          CertUtil -hashfile "$FinalName" SHA256 > "$FinalName.sha256"
          echo "FILENAME=$FinalName" >> $env:GITHUB_ENV

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            ${{ env.FILENAME }}
            ${{ env.FILENAME }}.sha256

  build-macos:
    name: Build macOS (ARM64)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Clean Version
        run: |
          # Strips the leading 'v' using sed
          CLEAN_VERSION=$(echo "${{ github.ref_name }}" | sed 's/^v//')
          echo "CLEAN_VERSION=$CLEAN_VERSION" >> $GITHUB_ENV

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Binaries (Deno & FFmpeg)
        run: |
          brew install ffmpeg deno
          mkdir -p bin
          cp $(which ffmpeg) bin/ffmpeg
          cp $(which deno) bin/deno
          chmod +x bin/*

      - name: Build macOS App
        run: |
          python -m PyInstaller --clean --windowed \
            --collect-all customtkinter --collect-all yt_dlp \
            --add-data "assets:assets" \
            --add-binary "bin/ffmpeg:bin" \
            --add-binary "bin/deno:bin" \
            --icon "assets/icon.icns" 
            --name "${{ env.APP_NAME }}" 
            main.py

      - name: Create DMG
        run: |
          mkdir -p dist/dmg_staging
          cp -R "dist/${{ env.BINARY_NAME }}.app" dist/dmg_staging/
          ln -s /Applications dist/dmg_staging/Applications
          
          FINAL_NAME="${{ env.BINARY_NAME }}_${{ env.CLEAN_VERSION }}_mac-arm64.dmg"
          hdiutil create -volname "${{ env.APP_NAME }}" -srcfolder dist/dmg_staging -ov -format UDZO "$FINAL_NAME"
          
          shasum -a 256 "$FINAL_NAME" > "$FINAL_NAME.sha256"
          echo "FILENAME_MAC=$FINAL_NAME" >> $GITHUB_ENV

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: |
            ${{ env.FILENAME_MAC }}
            ${{ env.FILENAME_MAC }}.sha256

  release:
    name: Create GitHub Release
    needs: [ build-windows, build-macos ]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./downloads
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "${{ env.APP_NAME }} ${{ github.ref_name }}" # Keeps 'v' in title for readability
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: ./downloads/*