name: Build & Release (Multi-OS)

on:
  push:
    branches: ["main"]
    tags:
      - "v*"  # Matches v0.1.0, v0.1.0-beta, etc.

env:
  APP_NAME: UniversalDownloader
  VERSION: ${{ github.ref_name }}  # Git tag version

jobs:

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    env:
      VERSION: ${{ github.ref_name }}
    outputs:
      artifact_path: ${{ steps.rename.outputs.artifact }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Install FFmpeg
        run: choco install ffmpeg -y

      - name: Copy FFmpeg binaries
        run: |
          copy "C:\ProgramData\chocolatey\lib\ffmpeg\tools\ffmpeg\bin\ffmpeg.exe" ffmpeg.exe
          copy "C:\ProgramData\chocolatey\lib\ffmpeg\tools\ffmpeg\bin\ffprobe.exe" ffprobe.exe

      - name: Build executable with version info
        run: |
          python -m PyInstaller --clean --noconsole --onefile ^
          --collect-all customtkinter ^
          --collect-all yt_dlp ^
          --add-data "assets;assets" ^
          --add-binary "ffmpeg.exe;." ^
          --add-binary "ffprobe.exe;." ^
          --icon "assets/icon.ico" ^
          --version-file "assets/version.py" ^
          --name "UniversalDownloader_win64" ^
          main.py

      - name: Rename Windows artifact with version
        id: rename
        run: |
          ren dist\UniversalDownloader_win64.exe %APP_NAME%_win64_%VERSION%.exe
          echo "artifact=dist\%APP_NAME%_win64_%VERSION%.exe" >> $GITHUB_OUTPUT


  build-macos:
    name: Build macOS
    runs-on: macos-latest
    outputs:
      artifact_path: ${{ steps.rename.outputs.artifact }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
          npm install -g create-dmg

      - name: Download FFmpeg
        run: |
          curl -L -o ffmpeg.zip https://evermeet.cx/ffmpeg/getrelease/zip
          unzip -o ffmpeg.zip
          mv ffmpeg ffmpeg_bin

          curl -L -o ffprobe.zip https://evermeet.cx/ffmpeg/getrelease/ffprobe/zip
          unzip -o ffprobe.zip
          mv ffmpeg ffprobe

          mv ffmpeg_bin ffmpeg
          chmod +x ffmpeg ffprobe

      - name: Build macOS app
        run: |
          python -m PyInstaller --clean --windowed \
          --collect-all customtkinter \
          --collect-all yt_dlp \
          --add-data "assets:assets" \
          --add-binary "ffmpeg:." \
          --add-binary "ffprobe:." \
          --icon "assets/icon.icns" \
          --name "UniversalDownloader_macOS" \
          main.py

      - name: Create DMG
        run: |
          cd dist
          create-dmg UniversalDownloader_macOS.app \
            --overwrite \
            --dmg-title "Universal Downloader ${{ env.VERSION }}" \
            "${APP_NAME}_macOS_${VERSION}.dmg"

      - name: Set artifact output
        id: rename
        run: |
          echo "artifact=dist/${APP_NAME}_macOS_${VERSION}.dmg" >> $GITHUB_OUTPUT


  release:
    name: Create Release
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Create Versions File with commit hash
        run: |
          TAG=${VERSION}
          COMMIT=$(git rev-parse --short HEAD)
          echo "Version: $TAG" > versions_${VERSION}.txt
          echo "Commit: $COMMIT" >> versions_${VERSION}.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Universal Media Downloader ${{ github.ref_name }}
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            ${{ needs.build-windows.outputs.artifact_path }}
            ${{ needs.build-macos.outputs.artifact_path }}
            versions_${VERSION}.txt