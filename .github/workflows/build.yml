name: Build Universal Downloader

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Fetch Missing Binaries (FFmpeg & Deno)
      run: |
        # Create assets folder if it doesn't exist
        New-Item -ItemType Directory -Force -Path "assets"
        
        # 1. Download & Extract Deno
        Invoke-WebRequest -Uri "https://github.com/denoland/deno/releases/download/v1.41.0/deno-x86_64-pc-windows-msvc.zip" -OutFile "deno.zip"
        Expand-Archive -Path "deno.zip" -DestinationPath "assets" -Force
        
        # 2. Download & Extract FFmpeg (from your yt-dlp link)
        Invoke-WebRequest -Uri "https://github.com/yt-dlp/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip" -OutFile "ffmpeg.zip"
        Expand-Archive -Path "ffmpeg.zip" -DestinationPath "temp_ffmpeg" -Force
        
        # 3. Dig into the extracted FFmpeg folder and move the .exe files to assets
        Move-Item -Path "temp_ffmpeg\ffmpeg-master-latest-win64-gpl\bin\ffmpeg.exe" -Destination "assets\ffmpeg.exe" -Force
        Move-Item -Path "temp_ffmpeg\ffmpeg-master-latest-win64-gpl\bin\ffprobe.exe" -Destination "assets\ffprobe.exe" -Force

    - name: Compile with PyInstaller
      run: |
        pyinstaller --name "UniversalDownloader" --noconsole --onefile --windowed --add-data "assets;assets" --icon="assets/icon.ico" --version-file="version.txt" main.py

    - name: Upload Final Executable
      uses: actions/upload-artifact@v4
      with:
        name: UniversalDownloader-Windows
        path: dist/*.exe

    - name: Create Release and Upload Asset
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: dist/UniversalDownloader.exe
        tag_name: v0.1.0
        name: Universal Media Downloader v0.1.0
        body: |
          ### First Official Release
          This project is an educational showcase of a standalone media downloader.
           
          **Key Technical Features:**
          * Built-in **ffmpeg** for high-quality merging.
          * **Deno** runtime integration for anti-bot bypassing.
          * Multi-threaded **CustomTkinter** UI.
          * Single-file portable executable.
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}