name: Build & Release (Official)

on:
  push:
    tags:
      - "v*"  # Triggers only on version tags like v1.0.0

env:
  APP_NAME: "Universal Downloader"
  VERSION: ${{ github.ref_name }} # The tag itself (e.g., v1.0.0)
  PYTHON_VERSION: "3.14.3"

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v5.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Generate Build Metadata
        shell: bash
        run: |
          mkdir -p assets
          echo "${{ env.VERSION }}" > assets/version.txt
          echo "${GITHUB_SHA:0:7}" > assets/commit.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller "yt-dlp[default]"
          if (Test-Path requirements.txt) { pip install -r requirements.txt }

      - name: Install Binaries (Choco)
        shell: pwsh
        run: |
          choco install deno ffmpeg aria2 -y
          refreshenv
          mkdir bin
          Copy-Item "C:\ProgramData\chocolatey\bin\deno.exe" "bin\deno.exe"
          Copy-Item "C:\ProgramData\chocolatey\bin\ffmpeg.exe" "bin\ffmpeg.exe"
          Copy-Item "C:\ProgramData\chocolatey\bin\aria2c.exe" "bin\aria2c.exe"

      - name: Build Executable
        shell: pwsh
        run: |
          python -m PyInstaller --clean --noconsole --onefile `
            --collect-all customtkinter --collect-all yt_dlp `
            --add-data "assets;assets" `
            --add-binary "bin/ffmpeg.exe;bin" `
            --add-binary "bin/deno.exe;bin" `
            --add-binary "bin/aria2c.exe;bin" `
            --icon "assets/icon.ico" --name "${{ env.APP_NAME }}_win64" main.py

      - name: Rename for Release
        shell: pwsh
        run: |
          $NewName = "${{ env.APP_NAME }}_${{ env.VERSION }}_win64.exe"
          mv "dist/${{ env.APP_NAME }}_win64.exe" "dist/$NewName"
          echo "FINAL_NAME=$NewName" >> $env:GITHUB_ENV

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@b7c566a # v6.0.0
        with:
          name: windows-bin
          path: dist/${{ env.FINAL_NAME }}

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Generate Build Metadata
        run: |
          mkdir -p assets
          echo "${{ env.VERSION }}" > assets/version.txt
          echo "${GITHUB_SHA:0:7}" > assets/commit.txt

      - name: Install Binaries (Brew)
        run: |
          brew install deno ffmpeg aria2
          mkdir -p bin
          cp $(which ffmpeg) bin/ffmpeg
          cp $(which deno) bin/deno
          cp $(which aria2c) bin/aria2c
          chmod +x bin/*

      - name: Build macOS app
        run: |
          python -m PyInstaller --clean --windowed \
            --collect-all customtkinter --collect-all yt_dlp \
            --add-data "assets:assets" \
            --add-binary "bin/ffmpeg:bin" \
            --add-binary "bin/deno:bin" \
            --add-binary "bin/aria2c:bin" \
            --icon "assets/icon.icns" --name "${{ env.APP_NAME }}_macOS" main.py

      - name: Create DMG
        run: |
          mkdir -p dist/dmg_staging
          cp -R "dist/${{ env.APP_NAME }}_macOS.app" dist/dmg_staging/
          ln -s /Applications dist/dmg_staging/Applications
          hdiutil create -volname "${{ env.APP_NAME }} ${{ env.VERSION }}" -srcfolder dist/dmg_staging -ov -format UDZO "Release.dmg"

      - name: Rename DMG for Release
        run: |
          CLEAN_NAME="${{ env.APP_NAME }}_${{ env.VERSION }}_macOS.dmg"
          mv "Release.dmg" "$CLEAN_NAME"
          echo "FINAL_NAME_MAC=$CLEAN_NAME" >> $GITHUB_ENV

      - name: Upload macOS Artifact
        uses: actions/upload-artifact@b7c566a
        with:
          name: macos-bin
          path: ${{ env.FINAL_NAME_MAC }}

  release:
    name: Create GitHub Release
    needs: [ build-windows, build-macos ]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@fa0b912 # v4.4.1
        with:
          path: release_assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          name: ${{ env.APP_NAME }} ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            release_assets/windows-bin/*
            release_assets/macos-bin/*