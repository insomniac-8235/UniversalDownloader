name: Build & Release (Multi-OS)

on:
  push:
    branches: ["main"]
    tags:
      - "v*"  # Runs when tags like v0.2.0 are pushed

jobs:
  build-windows:
    name: Windows Build
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Install FFmpeg via Chocolatey
        run: choco install ffmpeg -y

      - name: Copy FFmpeg & FFprobe
        run: |
          copy "C:\ProgramData\chocolatey\lib\ffmpeg\tools\ffmpeg\bin\ffmpeg.exe" ffmpeg.exe
          copy "C:\ProgramData\chocolatey\lib\ffmpeg\tools\ffmpeg\bin\ffprobe.exe" ffprobe.exe

      - name: Compile Windows Executable
        run: |
          python -m PyInstaller --clean --noconsole --onefile ^
          --collect-all customtkinter ^
          --collect-all yt_dlp ^
          --add-data "assets;assets" ^
          --add-binary "ffmpeg.exe;." ^
          --add-binary "ffprobe.exe;." ^
          --icon "assets/icon.ico" ^
          --name "UniversalDownloader_win64_${{ github.ref_name }}" ^
          "main.py"

      - name: Create GitHub Release (Windows)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/UniversalDownloader_win64_${{ github.ref_name }}.exe
          name: Universal Media Downloader ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    name: macOS Build
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Download & Extract FFmpeg (Intel x86_64 for Rosetta)
        run: |
          curl -L -o ffmpeg.zip https://evermeet.cx/ffmpeg/get/zip
          curl -L -o ffprobe.zip https://evermeet.cx/ffprobe/get/zip

          unzip -o ffmpeg.zip
          unzip -o ffprobe.zip

          chmod +x ffmpeg ffprobe

          rm ffmpeg.zip ffprobe.zip

      - name: Compile macOS App Bundle
        run: |
          python -m PyInstaller --clean --windowed \
          --collect-all customtkinter \
          --collect-all yt_dlp \
          --add-data "assets:assets" \
          --add-binary "ffmpeg:." \
          --add-binary "ffprobe:." \
          --name "UniversalDownloader_macOS_${{ github.ref_name }}" \
          "main.py"

      - name: Zip the macOS App
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          cd dist
          zip -r "UniversalDownloader_macOS_${{ github.ref_name }}.zip" "UniversalDownloader_macOS_${{ github.ref_name }}.app"

      - name: Upload macOS Release Asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/UniversalDownloader_macOS_${{ github.ref_name }}.zip
          name: Universal Media Downloader ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}