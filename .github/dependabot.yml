version: 2

updates:
  # Keep GitHub Actions updated
  - package-ecosystem: "github-actions"
    directory: "/"                # Location of workflow files
    schedule:
      interval: "weekly"          # Check for updates weekly
    open-pull-requests-limit: 5   # Avoid too many open PRs
    ignore:
      - dependency-name: "*"
        versions: ["*beta*"]      # Skip beta versions for stability

  # Keep Python dependencies in requirements.txt updated
  - package-ecosystem: "pip"
    directory: "/"                # Root of repo where requirements.txt is
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    ignore:
      - dependency-name: "*"
        versions: ["*rc*", "*dev*", "*beta*"]   # Ignore pre-releases